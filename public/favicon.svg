<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="roundedSquare">
      <rect x="0" y="0" width="200" height="200" rx="44" ry="44"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedSquare)">
    <!-- base -->
    <rect x="0" y="0" width="200" height="200" fill="#0D1117"/>

    <!-- solid half: "rendered" side, with a play-triangle cut out of it -->
    <path d="M0,0 L200,0 L200,200 Z M112,44 L112,96 L158,70 Z" fill="#4F6BFF" fill-rule="evenodd"/>

    <!-- raw markdown half: hash mark -->
    <g stroke="#8FB8FF" stroke-width="11" stroke-linecap="round">
      <line x1="50" y1="112" x2="50" y2="160"/>
      <line x1="80" y1="112" x2="80" y2="160"/>
      <line x1="39" y1="124" x2="91" y2="124"/>
      <line x1="39" y1="148" x2="91" y2="148"/>
    </g>

    <!-- diagonal seam highlight -->
    <line x1="0" y1="0" x2="200" y2="200" stroke="#1B2130" stroke-width="2"/>
  </g>
</svg>
